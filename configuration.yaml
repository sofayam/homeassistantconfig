
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

recorder:
  purge_keep_days: 365
  exclude:
    domains:
      - sun
      - weather
      
input_number: 
  pellet_oven_hours_at_last_refill:
    name: Pellet Oven Hours at Last Refill
    min: 0
    max: 10000
    step: 0.1

  pellet_oven_hours_per_refill:  # ADD THIS
    name: Pellet Oven Hours Per Refill
    min: 0
    max: 200
    step: 0.1

input_datetime:
  last_pellet_refill_time:
    name: Last Pellet Refill Time
    has_date: true
    has_time: true

input_button:
  pellet_oven_refill:
    name: Pellet Oven Refill

# ADD THIS WHOLE SECTION:

template:
  - sensor:
      - name: "Pellet Oven Hours Since Refill"
        unit_of_measurement: "h"
        state: >
          {{ (states('sensor.ecoforest_working_time') | float(0) - 
              states('input_number.pellet_oven_hours_at_last_refill') | float(0)) | round(1) }}


sensor:
  - platform: rest
    name: "rainfall_last_24h"
    unique_id: rainfall_last_24h
    resource: "https://api.open-meteo.com/v1/forecast?latitude=37.14&longitude=-8.54&hourly=precipitation&past_days=1&forecast_days=0&timezone=Europe%2FLisbon"
    value_template: >
      {{ value_json.hourly.precipitation[-24:] | sum | round(2) }}
    unit_of_measurement: "mm"
    scan_interval: 21600
    
  - platform: rest
    name: "rainfall_yesterday_mm"
    unique_id: rainfall_yesterday_mm
    resource: "https://api.open-meteo.com/v1/forecast?latitude=37.14&longitude=-8.54&daily=precipitation_sum&past_days=1&forecast_days=0&timezone=Europe%2FLisbon"
    value_template: >
      {{ value_json.daily.precipitation_sum[0] }}
    unit_of_measurement: "mm"
    scan_interval: 86400